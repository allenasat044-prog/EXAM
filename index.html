<script>
function hl(code){
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(/\b(int|void|char|float|return|if|else|while|for|break|continue|struct|typedef|define|include|NULL|printf|scanf|perror|sizeof)\b/g,'<span class="kw">$1</span>')
    .replace(/(#include|#define)/g,'<span class="inc">$1</span>')
    .replace(/\b(sem_wait|sem_post|sem_init|pthread_create|pthread_join|pthread_mutex_lock|pthread_mutex_unlock|pthread_mutex_init|pthread_mutex_destroy|fork|getpid|getppid|opendir|readdir|closedir|open|read|write|close|sleep)\b/g,'<span class="fn">$1</span>')
    .replace(/"([^"]*)"/g,'<span class="str">"$1"</span>')
    .replace(/\b(\d+)\b(?![^<]*>)/g,'<span class="num">$1</span>');
}

function pill(t,cls=''){return `<span class="key-pill ${cls}">${t}</span>`;}

const data = {
exp1:{title:"Exp 1: System Calls",subs:{
  "pf":{title:"getpid / getppid / fork",
    algo:[
      {t:"Understand Process IDs",d:`Every process in Linux has a unique <b>PID</b> (Process ID). The <b>PPID</b> (Parent PID) tells which process created it. ${pill('getpid()')} returns caller's PID, ${pill('getppid()')} returns parent's PID — both from <code>&lt;unistd.h&gt;</code>.`},
      {t:"Call fork() to create a child process",d:`${pill('fork()')} duplicates the calling process. It returns ${pill('0','teal')} in the child, the ${pill('child_pid')} in the parent, and ${pill('-1','red')} on failure. After fork, both processes execute independently from the same point.`},
      {t:"Differentiate parent and child",d:`Check the return value: <code>if(pid==0)</code> → child block; <code>else</code> → parent block. Both share the same code but have different PIDs. Parent typically waits for child using <code>wait()</code>.`},
      {t:"Print and verify PIDs",d:`In child: print getpid() (should be new PID) and getppid() (should match parent's getpid()). In parent: print getpid() and the pid returned by fork(). Verify parent-child relationship.`},
    ],
    code:`#include<stdio.h>
#include<unistd.h>

int main(){
    pid_t pid;
    printf("Before fork: PID = %d\\n", getpid());

    pid = fork();  // create child process

    if(pid < 0){
        perror("fork failed");
        return 1;
    }
    if(pid == 0){
        // Child process block
        printf("[CHILD]  My PID  = %d\\n", getpid());
        printf("[CHILD]  My PPID = %d\\n", getppid());
    } else {
        // Parent process block
        printf("[PARENT] My PID       = %d\\n", getpid());
        printf("[PARENT] Child's PID  = %d\\n", pid);
    }
    return 0;
}
// Compile: gcc pid_fork.c -o pid_fork
// Run:     ./pid_fork`},

  "dir":{title:"opendir / readdir / closedir",
    algo:[
      {t:"Include dirent.h for directory operations",d:`Linux represents directories as streams of entries. ${pill('opendir(path)')} opens a directory and returns a ${pill('DIR*')} pointer. Returns NULL if path is invalid — always check!`},
      {t:"opendir() — open directory stream",d:`${pill('DIR *d = opendir(".")')} opens current directory. The dot <code>"."</code> means current dir, <code>".."</code> means parent. You can also pass absolute paths like <code>"/home/user"</code>.`},
      {t:"readdir() — read one entry at a time",d:`${pill('readdir(d)')} returns a pointer to <code>struct dirent</code> containing the entry name in <code>d_name</code> field. Returns NULL at end-of-directory. Loop until NULL to read all entries.`},
      {t:"closedir() — release the DIR handle",d:`Always call ${pill('closedir(d)')} after reading. Not closing causes resource leak (file descriptor leak). This is analogous to <code>fclose()</code> for file pointers.`},
    ],
    code:`#include<stdio.h>
#include<dirent.h>

int main(){
    char path[200];
    printf("Enter directory path (press Enter for current dir '.'): ");
    scanf("%s", path);

    DIR *d = opendir(path);
    if(!d){
        perror("opendir failed");
        return 1;
    }

    struct dirent *entry;
    int count = 0;
    printf("\\nListing: %s\\n", path);
    printf("----------------------------\\n");
    while((entry = readdir(d)) != NULL){
        printf("  %s\\n", entry->d_name);
        count++;
    }
    printf("----------------------------\\n");
    printf("Total entries: %d\\n", count);

    closedir(d);  // always close!
    return 0;
}
// Compile: gcc dir.c -o dir
// Run:     ./dir`},

  "rw":{title:"open / read / write / close",
    algo:[
      {t:"File descriptors — Linux I/O model",d:`In Linux, everything is a file. ${pill('open()')} returns an integer called a <b>file descriptor (fd)</b>. Standard ones: 0=stdin, 1=stdout, 2=stderr. Custom files get fd ≥ 3.`},
      {t:"open() — open a file",d:`${pill('open(filename, O_RDONLY)')} opens for reading. Other flags: ${pill('O_WRONLY')} write-only, ${pill('O_RDWR')} both, ${pill('O_CREAT')} create if missing. Requires <code>&lt;fcntl.h&gt;</code>. Returns -1 on failure.`},
      {t:"read() — read raw bytes",d:`${pill('read(fd, buf, n)')} reads up to n bytes into buf. Returns bytes actually read — may be less than n. Returns ${pill('0','teal')} at EOF. Returns ${pill('-1','red')} on error. Needs <code>&lt;unistd.h&gt;</code>.`},
      {t:"write() — write raw bytes",d:`${pill('write(fd, buf, n)')} writes n bytes from buf to fd. Use ${pill('STDOUT_FILENO')} (=1) to write to screen. This is the low-level alternative to printf.`},
      {t:"close() — release file descriptor",d:`${pill('close(fd)')} flushes buffers and releases the file descriptor. Always close after use. Unclosed fds cause descriptor exhaustion in long-running programs.`},
    ],
    code:`#include<stdio.h>
#include<fcntl.h>
#include<unistd.h>

int main(){
    char filename[200];
    printf("Enter filename to read: ");
    scanf("%s", filename);

    int fd = open(filename, O_RDONLY);
    if(fd < 0){
        perror("open failed");
        return 1;
    }

    char buf[256];
    int bytes_read;
    printf("\\n--- File Contents ---\\n");
    while((bytes_read = read(fd, buf, sizeof(buf))) > 0){
        write(STDOUT_FILENO, buf, bytes_read);
    }
    printf("\\n--- End of File ---\\n");

    close(fd);  // always close file descriptor
    return 0;
}
// Compile: gcc fileio.c -o fileio
// Run:     ./fileio   (make sure test.txt exists)`}
}},

exp2:{title:"Exp 2: CPU Scheduling",subs:{
  fcfs:{title:"FCFS — First Come First Served",
    algo:[
      {t:"Concept — non-preemptive, arrival order",d:`FCFS is the simplest scheduling algorithm. Processes are scheduled in the order they arrive. Once a process starts executing, it runs to completion (non-preemptive). Simple but suffers from <b>Convoy Effect</b> — short jobs wait behind long ones.`},
      {t:"Sort by Arrival Time",d:`Before scheduling, sort all processes by their Arrival Time (AT). If two processes have same AT, break ties by process ID. This ensures the CPU services whoever arrived first.`},
      {t:"Calculate Completion Time (CT)",d:`Maintain a variable <code>t</code> (current time). For each process: <code>t = max(t, AT[i]) + BT[i]</code>. The <code>max()</code> handles idle CPU gaps when no process has arrived yet. CT[i] = t after this step.`},
      {t:"Calculate TAT and WT",d:`${pill('TAT = CT - AT')} (time from arrival to completion). ${pill('WT = TAT - BT')} (time spent waiting in ready queue). A process with WT=0 means it started executing immediately on arrival.`},
      {t:"Compute averages",d:`Average WT = ΣWT / n, Average TAT = ΣTAT / n. FCFS gives poor avg WT when processes have varying burst times. Gantt chart helps visualize execution order.`},
    ],
    code:`#include<stdio.h>

int main(){
    int n;
    printf("Enter number of processes: ");
    scanf("%d", &n);

    int at[n], bt[n], ct[n], tat[n], wt[n];
    for(int i=0; i<n; i++){
        printf("Process P%d -> Arrival Time : ", i+1); scanf("%d",&at[i]);
        printf("Process P%d -> Burst Time   : ", i+1); scanf("%d",&bt[i]);
    }

    int t = 0;
    for(int i=0; i<n; i++){
        if(t < at[i]) t = at[i];  // CPU idle until process arrives
        t += bt[i];
        ct[i] = t;
        tat[i] = ct[i] - at[i];
        wt[i]  = tat[i] - bt[i];
    }

    printf("\\nP\\tAT\\tBT\\tCT\\tTAT\\tWT\\n");
    float sw=0, st=0;
    for(int i=0; i<n; i++){
        printf("P%d\\t%d\\t%d\\t%d\\t%d\\t%d\\n",i+1,at[i],bt[i],ct[i],tat[i],wt[i]);
        sw += wt[i]; st += tat[i];
    }
    printf("\\nAvg Waiting Time    = %.2f\\n", sw/n);
    printf("Avg Turnaround Time = %.2f\\n", st/n);
    return 0;
}`},

  rr:{title:"Round Robin",
    algo:[
      {t:"Concept — preemptive, fixed quantum",d:`Round Robin is designed for time-sharing systems. Each process gets a fixed time slice called ${pill('quantum (q)')}. After q units, if not done, it's preempted and put back in the ready queue. Fair but has overhead from context switching.`},
      {t:"Ready queue and remaining time array",d:`Maintain <code>rem[]</code> = remaining burst time for each process. Scan processes in order — a process joins scheduling when <code>AT[i] <= current_time</code>. Loop until all rem[] = 0.`},
      {t:"Execute for min(remaining, quantum)",d:`For each process in queue: if <code>rem[i] <= q</code>, execute fully — CT[i] = t + rem[i], done++. If <code>rem[i] > q</code>, execute q units — rem[i] -= q, t += q, re-enter queue.`},
      {t:"Handle idle CPU",d:`If no process is ready at current time (all have AT > t), increment t by 1. This prevents infinite loop when processes haven't arrived yet.`},
      {t:"Calculate TAT and WT after all done",d:`After all processes complete, TAT[i] = CT[i] - AT[i], WT[i] = TAT[i] - BT[i]. Smaller quantum → better response time but more context switches. Larger quantum → approaches FCFS.`},
    ],
    code:`#include<stdio.h>

int main(){
    int n, q;
    printf("Enter number of processes : "); scanf("%d",&n);
    printf("Enter time quantum        : "); scanf("%d",&q);

    int at[n], bt[n], rem[n], ct[n];
    for(int i=0;i<n;i++){
        printf("P%d -> AT BT: ", i+1); scanf("%d%d",&at[i],&bt[i]);
        rem[i] = bt[i];
    }

    int t=0, done=0;
    while(done < n){
        int found = 0;
        for(int i=0; i<n; i++){
            if(rem[i]>0 && at[i]<=t){
                found = 1;
                if(rem[i] <= q){
                    t += rem[i]; rem[i]=0; ct[i]=t; done++;
                } else {
                    rem[i] -= q; t += q;
                }
            }
        }
        if(!found) t++;  // CPU idle
    }

    printf("\\nP\\tAT\\tBT\\tCT\\tTAT\\tWT\\n");
    float sw=0, st=0;
    for(int i=0;i<n;i++){
        int tat=ct[i]-at[i], wt=tat-bt[i];
        printf("P%d\\t%d\\t%d\\t%d\\t%d\\t%d\\n",i+1,at[i],bt[i],ct[i],tat,wt);
        sw+=wt; st+=tat;
    }
    printf("\\nAvg WT=%.2f  Avg TAT=%.2f\\n",sw/n,st/n);
    return 0;
}`},

  sjf:{title:"SJF — Non-Preemptive",
    algo:[
      {t:"Concept — shortest burst gets CPU next",d:`SJF selects the process with the smallest Burst Time among all arrived and unfinished processes. Non-preemptive means once a process starts, it runs to completion. Minimizes average waiting time (provably optimal for avg WT).`},
      {t:"At each step, find the shortest arrived job",d:`Scan all processes: if <code>!done[i] && AT[i]<=t && BT[i] < min</code>, select it. This guarantees the process that will take least time is chosen. Break ties with FCFS (lower index).`},
      {t:"Handle CPU idle time",d:`If no process has arrived at current time t, increment t and continue scanning. This handles gaps between process arrivals. Without this, the loop becomes infinite.`},
      {t:"Execute selected process, update time",d:`Once selected process runs: <code>t += bt[sel]</code>, <code>ct[sel] = t</code>, <code>done[sel] = 1</code>, <code>fin++</code>. No preemption — process runs fully. Then pick next shortest from remaining.`},
      {t:"Calculate TAT and WT",d:`TAT = CT - AT, WT = TAT - BT. SJF suffers from ${pill('starvation','red')} — long processes may wait forever if short ones keep arriving. Solution: ${pill('Aging')} (increase priority over time).`},
    ],
    code:`#include<stdio.h>

int main(){
    int n;
    printf("Enter number of processes: "); scanf("%d",&n);

    int at[n], bt[n], done[n], ct[n];
    for(int i=0;i<n;i++){
        printf("P%d -> AT BT: ",i+1); scanf("%d%d",&at[i],&bt[i]);
        done[i]=0;
    }

    int t=0, fin=0;
    while(fin < n){
        int sel=-1, mn=9999;
        for(int i=0;i<n;i++)
            if(!done[i] && at[i]<=t && bt[i]<mn){mn=bt[i]; sel=i;}
        if(sel==-1){ t++; continue; }  // no process ready, idle
        t += bt[sel]; ct[sel]=t; done[sel]=1; fin++;
    }

    printf("\\nP\\tAT\\tBT\\tCT\\tTAT\\tWT\\n");
    float sw=0, st=0;
    for(int i=0;i<n;i++){
        int tat=ct[i]-at[i], wt=tat-bt[i];
        printf("P%d\\t%d\\t%d\\t%d\\t%d\\t%d\\n",i+1,at[i],bt[i],ct[i],tat,wt);
        sw+=wt; st+=tat;
    }
    printf("\\nAvg WT=%.2f  Avg TAT=%.2f\\n",sw/n,st/n);
    return 0;
}`},

  pri:{title:"Priority Scheduling",
    algo:[
      {t:"Concept — each process has a priority number",d:`Each process is assigned a priority. Lower number = higher priority (in most systems). CPU always picks the highest priority ready process. Can be preemptive (new higher-priority preempts running) or non-preemptive. This implementation is non-preemptive.`},
      {t:"Select highest priority arrived process",d:`At each step scan all processes: pick <code>!done[i] && AT[i]<=t && PR[i] < min_priority</code>. In case of tie, FCFS is the tiebreaker. Update sel and mp (min priority found).`},
      {t:"Execute and compute CT",d:`Execute selected: t += bt[sel], ct[sel] = t, done[sel] = 1. Continue until all fin == n. Same idle-CPU handling as SJF — increment t if no process is ready.`},
      {t:"Starvation problem",d:`Low-priority processes may wait forever if high-priority ones keep arriving. Solution: ${pill('Aging')} — increase priority of waiting processes over time. E.g., every 5 units of waiting, decrease priority number by 1.`},
      {t:"TAT and WT calculation",d:`TAT = CT - AT, WT = TAT - BT. Priority scheduling is used in real OS (Linux nice values, Windows priority classes). ${pill('pr=1')} is highest priority, ${pill('pr=n')} is lowest in our implementation.`},
    ],
    code:`#include<stdio.h>

int main(){
    int n;
    printf("Enter number of processes: "); scanf("%d",&n);

    int at[n],bt[n],pr[n],done[n],ct[n];
    for(int i=0;i<n;i++){
        printf("P%d -> Arrival Time       : ",i+1); scanf("%d",&at[i]);
        printf("P%d -> Burst Time         : ",i+1); scanf("%d",&bt[i]);
        printf("P%d -> Priority (lower=high): ",i+1); scanf("%d",&pr[i]);
        done[i]=0;
    }

    int t=0, fin=0;
    while(fin < n){
        int sel=-1, mp=9999;
        for(int i=0;i<n;i++)
            if(!done[i] && at[i]<=t && pr[i]<mp){mp=pr[i]; sel=i;}
        if(sel==-1){ t++; continue; }
        t += bt[sel]; ct[sel]=t; done[sel]=1; fin++;
    }

    printf("\\nP\\tAT\\tBT\\tPR\\tCT\\tTAT\\tWT\\n");
    float sw=0,st=0;
    for(int i=0;i<n;i++){
        int tat=ct[i]-at[i], wt=tat-bt[i];
        printf("P%d\\t%d\\t%d\\t%d\\t%d\\t%d\\t%d\\n",i+1,at[i],bt[i],pr[i],ct[i],tat,wt);
        sw+=wt; st+=tat;
    }
    printf("\\nAvg WT=%.2f  Avg TAT=%.2f\\n",sw/n,st/n);
    return 0;
}`}
}},

exp3:{title:"Exp 3: Classical Problems",subs:{
  bb:{title:"Bounded Buffer (Producer-Consumer)",
    algo:[
      {t:"Problem statement",d:`A producer generates data items and places them in a shared buffer. A consumer takes items from the buffer. The buffer has a fixed size N. Problems: producer must not add when buffer is full; consumer must not remove when buffer is empty; they must not access buffer simultaneously.`},
      {t:"Three semaphores required",d:`${pill('empty = N')} — counts empty slots (producer waits when 0). ${pill('full = 0','teal')} — counts filled slots (consumer waits when 0). ${pill('mutex = 1')} — binary semaphore for mutual exclusion on buffer access.`},
      {t:"Producer logic",d:`wait(empty) → check if space available. wait(mutex) → lock buffer. Add item to buf[in]; in=(in+1)%N (circular). signal(mutex) → unlock. signal(full) → notify consumer item is ready. Order of waits matters — deadlock if mutex before empty.`},
      {t:"Consumer logic",d:`wait(full) → wait until item available. wait(mutex) → lock buffer. Remove item from buf[out]; out=(out+1)%N. signal(mutex) → unlock. signal(empty) → notify producer space is free. Symmetric to producer.`},
      {t:"Circular buffer mechanics",d:`Buffer is an array of size N. <code>in</code> index moves forward for each produce, <code>out</code> moves for each consume. Modulo N wraps them around. Buffer is full when (in+1)%N == out; empty when in == out.`},
    ],
    code:`#include<stdio.h>
#include<pthread.h>
#include<semaphore.h>
#define N 5  // buffer size

int buf[N], in=0, out=0;
sem_t empty, full, mutex;

void* producer(void* a){
    for(int i=1; i<=10; i++){
        sem_wait(&empty);   // wait if buffer full
        sem_wait(&mutex);   // lock critical section
        buf[in] = i;
        printf("[Producer] item=%d -> slot %d\\n", i, in);
        in = (in+1) % N;   // circular index
        sem_post(&mutex);   // unlock
        sem_post(&full);    // signal consumer
    }
    return NULL;
}

void* consumer(void* a){
    for(int i=1; i<=10; i++){
        sem_wait(&full);    // wait if buffer empty
        sem_wait(&mutex);   // lock critical section
        int item = buf[out];
        printf("[Consumer] item=%d <- slot %d\\n", item, out);
        out = (out+1) % N;
        sem_post(&mutex);   // unlock
        sem_post(&empty);   // signal producer
    }
    return NULL;
}

int main(){
    printf("Bounded Buffer Problem (N=%d)\\n\\n", N);
    sem_init(&empty, 0, N);   // N empty slots
    sem_init(&full,  0, 0);   // 0 full slots
    sem_init(&mutex, 0, 1);   // mutex=1 (unlocked)

    pthread_t p, c;
    pthread_create(&p, NULL, producer, NULL);
    pthread_create(&c, NULL, consumer, NULL);
    pthread_join(p, NULL);
    pthread_join(c, NULL);
    printf("\\nAll items produced and consumed.\\n");
    return 0;
}
// Compile: gcc bounded.c -lpthread -o bounded`},

  rw:{title:"Reader-Writer Problem",
    algo:[
      {t:"Problem statement",d:`Multiple readers can read a shared resource simultaneously (no conflict between reads). But a writer needs exclusive access — no reader or other writer can access during write. Two semaphores + one integer manage this concurrency.`},
      {t:"Semaphores and shared variables",d:`${pill('rw_mutex = 1')} — controls writer's exclusive access to resource. ${pill('mutex = 1','teal')} — protects the read_count variable itself. ${pill('read_count = 0')} — tracks how many readers are currently reading.`},
      {t:"Reader entry protocol",d:`lock(mutex) → read_count++ → if first reader (read_count==1), lock(rw_mutex) to block writers → unlock(mutex) → READ. The first reader blocks writers; subsequent readers just increment count and read freely.`},
      {t:"Reader exit protocol",d:`lock(mutex) → read_count-- → if last reader (read_count==0), unlock(rw_mutex) to allow writers → unlock(mutex). Only the last reader releases rw_mutex, allowing a waiting writer to proceed.`},
      {t:"Writer protocol — simple but strict",d:`wait(rw_mutex) → WRITE → signal(rw_mutex). Writer needs exclusive lock. If readers are active, writer blocks. Writers can starve if readers keep coming — solution: give writers priority or use fair queuing.`},
    ],
    code:`#include<stdio.h>
#include<pthread.h>
#include<semaphore.h>

sem_t rw_mutex, mutex;
int read_count = 0;

void* reader(void* a){
    int id = *(int*)a;
    // Entry section
    sem_wait(&mutex);
    read_count++;
    if(read_count == 1) sem_wait(&rw_mutex); // first reader locks writer
    sem_post(&mutex);

    // Reading (critical section for readers)
    printf("[Reader %d] is reading...\\n", id);

    // Exit section
    sem_wait(&mutex);
    read_count--;
    if(read_count == 0) sem_post(&rw_mutex); // last reader unlocks writer
    sem_post(&mutex);
    return NULL;
}

void* writer(void* a){
    int id = *(int*)a;
    sem_wait(&rw_mutex);  // exclusive access
    printf("[Writer %d] is writing...\\n", id);
    sem_post(&rw_mutex);
    return NULL;
}

int main(){
    printf("Reader-Writer Problem\\n\\n");
    sem_init(&rw_mutex, 0, 1);
    sem_init(&mutex,    0, 1);

    pthread_t r[3], w[2];
    int rid[]={1,2,3}, wid[]={1,2};
    for(int i=0;i<3;i++) pthread_create(&r[i],NULL,reader,&rid[i]);
    for(int i=0;i<2;i++) pthread_create(&w[i],NULL,writer,&wid[i]);
    for(int i=0;i<3;i++) pthread_join(r[i],NULL);
    for(int i=0;i<2;i++) pthread_join(w[i],NULL);
    return 0;
}
// Compile: gcc rw.c -lpthread -o rw`},

  dp:{title:"Dining Philosophers",
    algo:[
      {t:"Problem statement",d:`5 philosophers sit around a circular table. Each needs 2 forks (left and right) to eat. Only 5 forks exist, shared between neighbors. Philosophers alternate between thinking and eating. Classic problem demonstrating deadlock and starvation.`},
      {t:"Naive approach — deadlock scenario",d:`If each philosopher picks up their left fork simultaneously, all 5 hold 1 fork and wait for the right fork forever — ${pill('deadlock','red')}. No philosopher can proceed. This is why naive implementation fails.`},
      {t:"Deadlock-free solution — asymmetric ordering",d:`Odd-indexed philosophers pick ${pill('right fork first')}, even-indexed pick ${pill('left fork first','teal')}. This breaks the circular wait condition — at least one philosopher can always proceed, preventing deadlock.`},
      {t:"Semaphore per fork — initialization",d:`Each fork is represented by a semaphore initialized to 1 (available). ${pill('sem_wait(&fork[i])')} picks up fork i (blocks if already taken). ${pill('sem_post(&fork[i])')} puts it down (releases).`},
      {t:"Think → Pick forks → Eat → Put forks",d:`Philosopher lifecycle: think (sleep) → pick left fork → pick right fork → eat (sleep) → put right fork → put left fork → repeat. With asymmetric ordering, deadlock is avoided. Starvation can still occur without aging.`},
    ],
    code:`#include<stdio.h>
#include<pthread.h>
#include<semaphore.h>
#include<unistd.h>
#define N 5

sem_t fork_sem[N];  // one semaphore per fork

void* philosopher(void* a){
    int i = *(int*)a;
    int left  = i;
    int right = (i+1) % N;

    printf("Philosopher %d is thinking...\\n", i);
    sleep(1);

    // Asymmetric: even picks left first, odd picks right first
    if(i % 2 == 0){
        sem_wait(&fork_sem[left]);   // pick left fork
        sem_wait(&fork_sem[right]);  // pick right fork
    } else {
        sem_wait(&fork_sem[right]);  // pick right fork first
        sem_wait(&fork_sem[left]);   // then left fork
    }

    printf("Philosopher %d is EATING\\n", i);
    sleep(1);

    sem_post(&fork_sem[left]);   // put down left fork
    sem_post(&fork_sem[right]);  // put down right fork
    printf("Philosopher %d finished eating\\n", i);
    return NULL;
}

int main(){
    printf("Dining Philosophers (Deadlock-Free via Asymmetric)\\n\\n");
    for(int i=0; i<N; i++) sem_init(&fork_sem[i], 0, 1);
    pthread_t t[N]; int id[N];
    for(int i=0;i<N;i++){id[i]=i; pthread_create(&t[i],NULL,philosopher,&id[i]);}
    for(int i=0;i<N;i++) pthread_join(t[i],NULL);
    printf("\\nAll philosophers done.\\n");
    return 0;
}
// Compile: gcc dining.c -lpthread -o dining`},

  dlf:{title:"Deadlock-Free — Tanenbaum's Solution",
    algo:[
      {t:"States array — THINKING, HUNGRY, EATING",d:`Each philosopher is in one of 3 states stored in <code>state[N]</code>. ${pill('THINKING=0')} — not interested in eating. ${pill('HUNGRY=1','red')} — wants to eat, waiting. ${pill('EATING=2','teal')} — currently eating. State controls who gets to eat.`},
      {t:"test(i) — can philosopher i eat?",d:`Check: <code>state[i]==HUNGRY && state[LEFT]!=EATING && state[RIGHT]!=EATING</code>. If true: set <code>state[i]=EATING</code> and signal philosopher i's personal semaphore. Called both when picking up and when neighbors put down forks.`},
      {t:"pickup(i) — philosopher wants to eat",d:`lock(mutex) → set state[i]=HUNGRY → call test(i) → unlock(mutex) → sem_wait(&s[i]). If test() succeeded, sem is already posted so wait returns immediately. Otherwise philosopher blocks on personal semaphore.`},
      {t:"putdown(i) — philosopher done eating",d:`lock(mutex) → set state[i]=THINKING → test(LEFT neighbor) → test(RIGHT neighbor) → unlock(mutex). Testing neighbors wakes them up if they were waiting. This ensures no philosopher starves.`},
      {t:"Why this works — no deadlock, no starvation",d:`Deadlock impossible: philosopher only eats if both neighbors allow it (checked atomically under mutex). Starvation avoided: when you put forks down, you explicitly check and wake waiting neighbors. Guaranteed progress for all.`},
    ],
    code:`#include<stdio.h>
#include<pthread.h>
#include<semaphore.h>
#define N 5
#define THINKING 0
#define HUNGRY   1
#define EATING   2
#define L(i) ((i+N-1)%N)  // left neighbor
#define R(i) ((i+1)%N)    // right neighbor

int state[N];
sem_t s[N];   // personal semaphore per philosopher
sem_t mutex;  // protects state array

void test(int i){
    if(state[i]==HUNGRY && state[L(i)]!=EATING && state[R(i)]!=EATING){
        state[i] = EATING;
        printf("Philosopher %d: EATING now (safe)\\n", i);
        sem_post(&s[i]);  // allow philosopher to proceed
    }
}

void pickup(int i){
    sem_wait(&mutex);
    state[i] = HUNGRY;
    printf("Philosopher %d: HUNGRY, waiting...\\n", i);
    test(i);             // try to eat right now
    sem_post(&mutex);
    sem_wait(&s[i]);     // block if couldn't eat
}

void putdown(int i){
    sem_wait(&mutex);
    state[i] = THINKING;
    printf("Philosopher %d: done eating, THINKING\\n", i);
    test(L(i));  // maybe left neighbor can now eat
    test(R(i));  // maybe right neighbor can now eat
    sem_post(&mutex);
}

void* philosopher(void* a){
    int i = *(int*)a;
    pickup(i);
    putdown(i);
    return NULL;
}

int main(){
    printf("Tanenbaum Deadlock-Free Dining Philosophers\\n\\n");
    sem_init(&mutex, 0, 1);
    for(int i=0;i<N;i++){state[i]=THINKING; sem_init(&s[i],0,0);}
    pthread_t t[N]; int id[N];
    for(int i=0;i<N;i++){id[i]=i; pthread_create(&t[i],NULL,philosopher,&id[i]);}
    for(int i=0;i<N;i++) pthread_join(t[i],NULL);
    return 0;
}
// Compile: gcc tanenbaum.c -lpthread -o tanenbaum`}
}},

exp4:{title:"Exp 4: Sync Problems",subs:{
  tk:{title:"Ticket Booking — Mutex",
    algo:[
      {t:"Problem — race condition in booking",d:`Multiple users simultaneously check if a seat is available and try to book it. Without synchronization: User A reads seat[3]=0 (free), User B reads seat[3]=0 (free), both book the same seat — ${pill('double booking','red')}. This is a classic race condition.`},
      {t:"Identify the Critical Section",d:`Critical section is the code block: <i>check if seat is available → assign seat to user</i>. This read-check-write sequence must be atomic. Any interruption between read and write can cause the race condition.`},
      {t:"Mutex solution — mutual exclusion",d:`${pill('pthread_mutex_lock(&lock)')} — acquire lock before entering critical section. Only one thread at a time can hold the mutex. All other threads block at lock() until it's released.`},
      {t:"Execute critical section safely",d:`Inside lock: check all seats for availability, book first free seat, set seats[i]=user_id. This entire sequence runs atomically — no other thread can interfere. Then ${pill('pthread_mutex_unlock(&lock)')} — release for next thread.`},
      {t:"Race condition explanation for exam",d:`Race condition occurs when: (1) Two threads access shared data concurrently, (2) At least one thread writes, (3) No synchronization exists. Result is non-deterministic. Mutex, semaphores, or monitors prevent race conditions by ensuring mutual exclusion.`},
    ],
    code:`#include<stdio.h>
#include<pthread.h>
#define SEATS 5

int seats[SEATS] = {0};  // 0 = available, non-zero = booked by user
pthread_mutex_t lock;

void* book_seat(void* a){
    int uid = *(int*)a;

    pthread_mutex_lock(&lock);     // ENTER critical section
    // --- Critical Section Start ---
    int booked = 0;
    for(int i=0; i<SEATS; i++){
        if(seats[i] == 0){
            seats[i] = uid;
            printf("[User %d] Booked Seat %d successfully\\n", uid, i+1);
            booked = 1;
            break;
        }
    }
    if(!booked)
        printf("[User %d] Sorry! No seats available.\\n", uid);
    // --- Critical Section End ---
    pthread_mutex_unlock(&lock);   // EXIT critical section

    return NULL;
}

int main(){
    int n;
    printf("Enter number of users trying to book: "); scanf("%d",&n);
    printf("\\nBooking System Started (Seats: %d)\\n\\n", SEATS);

    pthread_mutex_init(&lock, NULL);
    pthread_t t[n]; int id[n];
    for(int i=0;i<n;i++){id[i]=i+1; pthread_create(&t[i],NULL,book_seat,&id[i]);}
    for(int i=0;i<n;i++) pthread_join(t[i],NULL);
    pthread_mutex_destroy(&lock);

    printf("\\nFinal Seat Status:\\n");
    for(int i=0;i<SEATS;i++)
        printf("  Seat %d: %s\\n",i+1,seats[i]?("User "+seats[i]):"Free");
    return 0;
}
// Compile: gcc ticket.c -lpthread -o ticket`},

  fd:{title:"Food Delivery — Producer-Consumer",
    algo:[
      {t:"Model — customers as producers, kitchen as consumer",d:`Customers (threads) place orders into a shared bounded buffer. Kitchen thread consumes orders one by one and processes them. Classic bounded buffer problem applied to real-world food delivery.`},
      {t:"Semaphores for synchronization",d:`${pill('empty = N')} — slots available for new orders (customer waits when 0). ${pill('full = 0','teal')} — pending orders (kitchen waits when 0). ${pill('mutex = 1')} — protects buffer during add/remove. N is max simultaneous orders.`},
      {t:"Customer (Producer) thread",d:`sem_wait(empty) → sem_wait(mutex) → orders[in]=customer_id; in=(in+1)%N → sem_post(mutex) → sem_post(full). If buffer full, customer waits (realistic — system holds limited orders).`},
      {t:"Kitchen (Consumer) thread",d:`sem_wait(full) → sem_wait(mutex) → fetch orders[out]; out=(out+1)%N → sem_post(mutex) → sem_post(empty). Kitchen processes orders sequentially. Order status could be tracked in a separate array.`},
      {t:"Order status and delivery assignment",d:`In production, each order has a status (placed→accepted→preparing→ready→delivered). The bounded buffer handles synchronization; a status array tracks progress. Delivery assignment can use another producer-consumer pair.`},
    ],
    code:`#include<stdio.h>
#include<pthread.h>
#include<semaphore.h>
#define N 3  // max orders in buffer

int orders[N], in=0, out=0, total;
sem_t empty, full, mutex;

void* customer(void* a){
    int id = *(int*)a;
    sem_wait(&empty);   // wait if kitchen queue full
    sem_wait(&mutex);
    orders[in] = id;
    printf("[Customer %d] Order placed in slot %d\\n", id, in);
    in = (in+1) % N;
    sem_post(&mutex);
    sem_post(&full);    // notify kitchen
    return NULL;
}

void* kitchen(void* a){
    for(int i=0; i<total; i++){
        sem_wait(&full);    // wait for orders
        sem_wait(&mutex);
        int cid = orders[out];
        printf("[Kitchen]   Processing order from Customer %d\\n", cid);
        out = (out+1) % N;
        sem_post(&mutex);
        sem_post(&empty);   // slot freed
    }
    printf("[Kitchen]   All orders done!\\n");
    return NULL;
}

int main(){
    printf("Enter number of customers: "); scanf("%d",&total);
    printf("\\nFood Delivery System (Buffer size=%d)\\n\\n", N);

    sem_init(&empty, 0, N);
    sem_init(&full,  0, 0);
    sem_init(&mutex, 0, 1);

    pthread_t c[total], k;
    int id[total];
    for(int i=0;i<total;i++){id[i]=i+1;pthread_create(&c[i],NULL,customer,&id[i]);}
    pthread_create(&k, NULL, kitchen, NULL);
    for(int i=0;i<total;i++) pthread_join(c[i],NULL);
    pthread_join(k, NULL);
    return 0;
}
// Compile: gcc food.c -lpthread -o food`},

  ts:{title:"Smart Traffic Signal — Semaphore",
    algo:[
      {t:"Problem — 4-way intersection control",d:`At a 4-way intersection, vehicles from N/S/E/W compete to cross. If multiple directions get green simultaneously → accidents. System must ensure only one direction gets green at a time using process synchronization.`},
      {t:"Model — directions as processes/threads",d:`Each of the 4 directions is modeled as a separate thread. All compete for a single shared resource: the right to send vehicles through. Binary semaphore (mutex=1) acts as the traffic controller.`},
      {t:"Semaphore as traffic controller",d:`${pill('sem_t road')} initialized to 1. Only 1 direction can hold this semaphore at a time. sem_wait(road) → GREEN signal → vehicles pass → sem_post(road). Other directions are in RED, waiting on sem_wait().`},
      {t:"Mutual exclusion guarantees safety",d:`The semaphore enforces that exactly one thread is in the critical section (intersection) at a time. This directly maps to: one green signal at a time. All other directions are blocked (red) until green direction finishes.`},
      {t:"Extension — monitors and advanced control",d:`In real systems, monitors with condition variables provide more control: signal green based on waiting time, vehicle density, emergency vehicles. For exam: understand that the semaphore provides the ${pill('mutual exclusion')} needed for safety.`},
    ],
    code:`#include<stdio.h>
#include<pthread.h>
#include<semaphore.h>
#include<unistd.h>

sem_t road;  // controls intersection access
char* dir[] = {"North","South","East","West"};

void* traffic(void* a){
    int i = *(int*)a;
    printf("[%s] Waiting at RED signal...\\n", dir[i]);

    sem_wait(&road);  // wait for green (acquire intersection)
    // --- Critical Section: vehicles crossing ---
    printf("[%s] GREEN -> Vehicles passing through!\\n", dir[i]);
    sleep(1);  // simulate crossing time
    printf("[%s] RED   -> Done crossing\\n", dir[i]);
    // --- End Critical Section ---
    sem_post(&road);  // release intersection for next direction

    return NULL;
}

int main(){
    printf("Smart Traffic Signal (4-way Intersection)\\n");
    printf("Only 1 direction gets GREEN at a time\\n\\n");

    sem_init(&road, 0, 1);  // 1 = intersection available
    pthread_t t[4]; int id[4]={0,1,2,3};
    for(int i=0;i<4;i++) pthread_create(&t[i],NULL,traffic,&id[i]);
    for(int i=0;i<4;i++) pthread_join(t[i],NULL);
    printf("\\nAll directions cleared.\\n");
    return 0;
}
// Compile: gcc traffic.c -lpthread -o traffic`}
}},

exp5:{title:"Exp 5: Memory Allocation",subs:{
  ff:{title:"First Fit",
    algo:[
      {t:"Concept — allocate first fitting hole",d:`Memory is divided into blocks (holes) of various sizes. When a process requests memory, scan from the beginning and allocate the first block that is large enough. Simple and fast — O(n) per allocation but may leave small unusable fragments at the start.`},
      {t:"Scan from beginning for each process",d:`For each process i: start scanning blocks from j=0. At each block j: if <code>block[j] >= process[i]</code>, allocate. Assign alloc[i] = j+1 (block number). Reduce block size: <code>block[j] -= process[i]</code>. Break immediately.`},
      {t:"External fragmentation",d:`After several allocations, small leftover pieces accumulate at the beginning. These fragments are too small for future requests — this is ${pill('external fragmentation','red')}. Compaction (moving blocks) can solve it but is expensive.`},
      {t:"If no block fits — Not Allocated",d:`If the inner loop completes without finding a suitable block, alloc[i] remains -1, meaning the process cannot be allocated. In a real OS, the process would be swapped to disk or the request would block.`},
      {t:"Comparison with Best/Worst Fit",d:`First Fit is fastest (stops at first fit). Best Fit minimizes waste. Worst Fit leaves largest leftover. First Fit generally performs better than Best Fit in practice despite seeming wasteful — it keeps large blocks at end available for big requests.`},
    ],
    code:`#include<stdio.h>

int main(){
    int nb, np;
    printf("Enter number of memory blocks   : "); scanf("%d",&nb);
    printf("Enter number of processes       : "); scanf("%d",&np);

    int bk[nb], ps[np], alloc[np];
    printf("\\nEnter block sizes (KB):\\n");
    for(int i=0;i<nb;i++){printf("  Block %d : ",i+1); scanf("%d",&bk[i]);}
    printf("Enter process sizes (KB):\\n");
    for(int i=0;i<np;i++){printf("  Process P%d : ",i+1); scanf("%d",&ps[i]); alloc[i]=-1;}

    // First Fit: allocate first fitting block
    for(int i=0;i<np;i++)
        for(int j=0;j<nb;j++)
            if(bk[j] >= ps[i]){
                alloc[i] = j+1;
                bk[j] -= ps[i];  // reduce block by process size
                break;           // stop at first fit
            }

    printf("\\n%-10s %-12s %-15s\\n","Process","Size(KB)","Allocated Block");
    printf("--------------------------------------\\n");
    for(int i=0;i<np;i++){
        printf("P%-9d %-12d ", i+1, ps[i]);
        if(alloc[i]==-1) printf("Not Allocated\\n");
        else             printf("Block %d\\n", alloc[i]);
    }

    printf("\\nRemaining block sizes:\\n");
    for(int i=0;i<nb;i++) printf("  Block %d: %d KB\\n",i+1,bk[i]);
    return 0;
}`},

  bf:{title:"Best Fit",
    algo:[
      {t:"Concept — find smallest sufficient hole",d:`For each process, scan ALL blocks and find the one with the smallest size that is still >= process size. This minimizes wasted space per allocation — leaves smallest possible leftover fragment. Trades time for space efficiency.`},
      {t:"Scan all blocks, track minimum",d:`Initialize <code>best=-1</code>. For each block j: if <code>bk[j] >= ps[i]</code> and (<code>best==-1</code> or <code>bk[j] < bk[best]</code>), update best=j. After scanning all, allocate block 'best'. Cannot break early — must check all.`},
      {t:"Why best fit can be worse than first fit",d:`Best Fit creates many tiny leftover fragments (near-zero size holes) that are often unusable. This ${pill('internal fragmentation')} paradoxically wastes more total space. First Fit's larger leftovers are more likely to satisfy future requests.`},
      {t:"Time complexity — O(n×m)",d:`For n processes and m blocks, total comparisons = n×m. Compared to First Fit's average n×(m/2), Best Fit is consistently slower. In practice with hundreds of blocks, this overhead matters.`},
      {t:"When to use Best Fit",d:`Prefer Best Fit when: memory is limited and waste must be minimal, processes are similar in size (so fragments are reusable), or real-time guarantees aren't needed. Avoid when speed is critical or process sizes vary greatly.`},
    ],
    code:`#include<stdio.h>

int main(){
    int nb, np;
    printf("Enter number of memory blocks   : "); scanf("%d",&nb);
    printf("Enter number of processes       : "); scanf("%d",&np);

    int bk[nb], ps[np], alloc[np];
    printf("\\nEnter block sizes (KB):\\n");
    for(int i=0;i<nb;i++){printf("  Block %d : ",i+1); scanf("%d",&bk[i]);}
    printf("Enter process sizes (KB):\\n");
    for(int i=0;i<np;i++){printf("  Process P%d : ",i+1); scanf("%d",&ps[i]); alloc[i]=-1;}

    // Best Fit: find smallest block that fits
    for(int i=0;i<np;i++){
        int best = -1;
        for(int j=0;j<nb;j++)
            if(bk[j]>=ps[i] && (best==-1 || bk[j]<bk[best]))
                best = j;  // update if smaller fitting block found
        if(best != -1){
            alloc[i] = best+1;
            bk[best] -= ps[i];
        }
    }

    printf("\\n%-10s %-12s %-15s\\n","Process","Size(KB)","Allocated Block");
    printf("--------------------------------------\\n");
    for(int i=0;i<np;i++){
        printf("P%-9d %-12d ", i+1, ps[i]);
        if(alloc[i]==-1) printf("Not Allocated\\n");
        else             printf("Block %d\\n", alloc[i]);
    }

    printf("\\nRemaining block sizes:\\n");
    for(int i=0;i<nb;i++) printf("  Block %d: %d KB\\n",i+1,bk[i]);
    return 0;
}`},

  wf:{title:"Worst Fit",
    algo:[
      {t:"Concept — allocate largest available hole",d:`Opposite of Best Fit. For each process, find the block with the LARGEST size >= process size. Idea: large blocks are more useful — after partial allocation, the leftover is still large enough for future requests. Maximizes leftover size.`},
      {t:"Scan all blocks, track maximum",d:`Initialize <code>worst=-1</code>. For each block j: if <code>bk[j] >= ps[i]</code> and (<code>worst==-1</code> or <code>bk[j] > bk[worst]</code>), update worst=j. Allocate block 'worst'. Must scan all blocks like Best Fit — no early termination.`},
      {t:"Rationale — large leftovers are useful",d:`If you have a 100KB block and need 20KB: Best Fit might use a 22KB block (2KB left — nearly useless). Worst Fit uses the 100KB block (80KB left — very useful). The large leftover can serve future large requests.`},
      {t:"Performance in practice",d:`Worst Fit generally performs ${pill('worst','red')} of the three (ironic naming). It fragments large blocks that could serve big processes. Best for uniform small requests. Least suitable when large blocks must be preserved.`},
      {t:"Summary comparison",d:`${pill('First Fit')} — fast, good overall. ${pill('Best Fit','teal')} — minimal immediate waste, many tiny fragments. ${pill('Worst Fit','red')} — largest leftovers, destroys large blocks. For exam: know which scans all vs stops early, and which fragmentation each creates.`},
    ],
    code:`#include<stdio.h>

int main(){
    int nb, np;
    printf("Enter number of memory blocks   : "); scanf("%d",&nb);
    printf("Enter number of processes       : "); scanf("%d",&np);

    int bk[nb], ps[np], alloc[np];
    printf("\\nEnter block sizes (KB):\\n");
    for(int i=0;i<nb;i++){printf("  Block %d : ",i+1); scanf("%d",&bk[i]);}
    printf("Enter process sizes (KB):\\n");
    for(int i=0;i<np;i++){printf("  Process P%d : ",i+1); scanf("%d",&ps[i]); alloc[i]=-1;}

    // Worst Fit: find largest block that fits
    for(int i=0;i<np;i++){
        int worst = -1;
        for(int j=0;j<nb;j++)
            if(bk[j]>=ps[i] && (worst==-1 || bk[j]>bk[worst]))
                worst = j;  // update if larger fitting block found
        if(worst != -1){
            alloc[i] = worst+1;
            bk[worst] -= ps[i];
        }
    }

    printf("\\n%-10s %-12s %-15s\\n","Process","Size(KB)","Allocated Block");
    printf("--------------------------------------\\n");
    for(int i=0;i<np;i++){
        printf("P%-9d %-12d ", i+1, ps[i]);
        if(alloc[i]==-1) printf("Not Allocated\\n");
        else             printf("Block %d\\n", alloc[i]);
    }

    printf("\\nRemaining block sizes:\\n");
    for(int i=0;i<nb;i++) printf("  Block %d: %d KB\\n",i+1,bk[i]);
    return 0;
}`}
}},

exp6:{title:"Exp 6: Page Replacement",subs:{
  fifo:{title:"FIFO — First In First Out",
    algo:[
      {t:"Virtual memory and page faults",d:`When a process accesses a page not currently in physical memory (frames), a ${pill('page fault','red')} occurs. OS must load the page from disk. If frames are full, a victim page must be replaced. The replacement algorithm determines which page to evict.`},
      {t:"FIFO — replace oldest loaded page",d:`Maintain a queue of pages currently in frames. On fault when full: remove the page that was loaded ${pill('earliest')} (front of queue). Load new page at the back. Intuition: oldest page has been around longest — maybe least needed. Simple but wrong intuition.`},
      {t:"Belady's Anomaly — FIFO's flaw",d:`FIFO suffers from ${pill("Belady's Anomaly",'red')}: increasing the number of frames can sometimes INCREASE page faults. This is counterintuitive and unique to FIFO. LRU and Optimal don't have this problem.`},
      {t:"Implementation — circular array or queue",d:`Use array <code>frame[f]</code> and index <code>front</code>. On fault: <code>frame[front%f] = new_page; front++</code>. This simulates circular queue. For each reference: check all frames for hit; if miss and frames full, replace frame[front%f].`},
      {t:"Count and display page faults",d:`For each page reference: scan frames array for hit. If hit — no fault. If miss — fault++, load page (evicting oldest if full). Print frame state after each reference. Final count = total page faults.`},
    ],
    code:`#include<stdio.h>

int main(){
    int n, f;
    printf("Enter number of page references : "); scanf("%d",&n);
    printf("Enter number of frames          : "); scanf("%d",&f);

    int pg[n];
    printf("Enter page reference string     : ");
    for(int i=0;i<n;i++) scanf("%d",&pg[i]);

    int frame[f], front=0, faults=0;
    for(int i=0;i<f;i++) frame[i]=-1;

    printf("\\nRef\\tFrames\\t\\t\\t\\tStatus\\n");
    printf("---\\t------\\t\\t\\t\\t------\\n");
    for(int i=0;i<n;i++){
        int hit=0;
        for(int j=0;j<f;j++)
            if(frame[j]==pg[i]){hit=1; break;}

        if(!hit){
            frame[front%f] = pg[i];  // replace oldest
            front++;
            faults++;
        }

        printf("%2d\\t", pg[i]);
        for(int j=0;j<f;j++)
            printf(frame[j]==-1?"[_] ":"[%d] ",frame[j]);
        printf("\\t%s\\n", hit?"HIT":"PAGE FAULT");
    }
    printf("\\n==> Total Page Faults: %d\\n", faults);
    return 0;
}`},

  lru:{title:"LRU — Least Recently Used",
    algo:[
      {t:"Concept — evict page unused longest",d:`LRU replaces the page that was accessed ${pill('longest time ago')}. Based on the principle of temporal locality: pages used recently are likely to be used again soon. Better than FIFO in practice, close to Optimal.`},
      {t:"Track last-used time for each frame",d:`Maintain array <code>age[f]</code> where age[j] = last time frame[j] was accessed (reference index i). On HIT: update age[hit_frame] = i (refresh). On MISS: replace frame with smallest age value (oldest last-use).`},
      {t:"Find LRU victim on page fault",d:`Scan all frames: find j with minimum age[j] — this frame holds the least recently used page. Replace frame[lru] with new page; update age[lru] = i. This is O(f) per fault — acceptable for small frame counts.`},
      {t:"Hit case — just update age",d:`When page is found in frames (hit), no replacement needed. Just update <code>age[hit_index] = i</code> to record that this frame was recently used. It won't be chosen as LRU victim soon.`},
      {t:"LRU vs FIFO vs Optimal",d:`LRU is better than FIFO (no Belady's anomaly) and close to Optimal. Optimal is theoretical best (future knowledge). LRU needs hardware support (reference bits, counters) in real OS. FIFO needs only a queue. For exam: LRU uses recency, FIFO uses arrival order.`},
    ],
    code:`#include<stdio.h>

int main(){
    int n, f;
    printf("Enter number of page references : "); scanf("%d",&n);
    printf("Enter number of frames          : "); scanf("%d",&f);

    int pg[n];
    printf("Enter page reference string     : ");
    for(int i=0;i<n;i++) scanf("%d",&pg[i]);

    int frame[f], age[f], faults=0;
    for(int i=0;i<f;i++){frame[i]=-1; age[i]=0;}

    printf("\\nRef\\tFrames\\t\\t\\t\\tStatus\\n");
    printf("---\\t------\\t\\t\\t\\t------\\n");
    for(int i=0;i<n;i++){
        int hit=-1;
        for(int j=0;j<f;j++)
            if(frame[j]==pg[i]){hit=j; break;}

        if(hit != -1){
            age[hit] = i;  // refresh: recently used
        } else {
            // find LRU frame (smallest age)
            int lru=0;
            for(int j=1;j<f;j++)
                if(age[j] < age[lru]) lru=j;
            frame[lru] = pg[i];
            age[lru]   = i;
            faults++;
        }

        printf("%2d\\t", pg[i]);
        for(int j=0;j<f;j++)
            printf(frame[j]==-1?"[_] ":"[%d] ",frame[j]);
        printf("\\t%s\\n", hit!=-1?"HIT":"PAGE FAULT");
    }
    printf("\\n==> Total Page Faults: %d\\n", faults);
    return 0;
}`},

  opt:{title:"Optimal Page Replacement",
    algo:[
      {t:"Concept — replace page used farthest in future",d:`Optimal (Belady's Algorithm) replaces the page that will not be used for the longest time in the future. It gives the ${pill('minimum possible page faults','teal')} for any reference string. Purely theoretical — needs future knowledge.`},
      {t:"For each frame, find next future use",d:`On page fault (frames full): for each page currently in a frame, scan the future reference string to find when it will be used next. If it's never used again, evict it immediately (farthest = infinity).`},
      {t:"Evict page with farthest next use",d:`Compare next-use distances of all frames. Evict the one with the largest next-use index. In code: inner loop <code>for(k=i+1;k&lt;n;k++) if(pg[k]==frame[j]) break</code>. If k reaches n, page never used again — perfect eviction candidate.`},
      {t:"Handle empty frames first",d:`Before applying replacement policy, check for empty frames (frame[j]==-1). Fill those first before any eviction. This simplifies logic and correctly handles the initial loading phase.`},
      {t:"Use as benchmark",d:`Optimal cannot be implemented in real OS (future is unknown). It's used to ${pill('benchmark')} other algorithms — e.g., "LRU achieves 87% of Optimal's performance on this workload." Any algorithm's fault count divided by Optimal's gives efficiency ratio.`},
    ],
    code:`#include<stdio.h>

int main(){
    int n, f;
    printf("Enter number of page references : "); scanf("%d",&n);
    printf("Enter number of frames          : "); scanf("%d",&f);

    int pg[n];
    printf("Enter page reference string     : ");
    for(int i=0;i<n;i++) scanf("%d",&pg[i]);

    int frame[f], faults=0;
    for(int i=0;i<f;i++) frame[i]=-1;

    printf("\\nRef\\tFrames\\t\\t\\t\\tStatus\\n");
    printf("---\\t------\\t\\t\\t\\t------\\n");
    for(int i=0;i<n;i++){
        // Check hit
        int hit=0;
        for(int j=0;j<f;j++) if(frame[j]==pg[i]){hit=1;break;}

        if(!hit){
            // Check for empty frame first
            int empty=-1;
            for(int j=0;j<f;j++) if(frame[j]==-1){empty=j;break;}

            if(empty != -1){
                frame[empty] = pg[i];  // use empty slot
            } else {
                // Find page used farthest in future
                int far=0, idx=0;
                for(int j=0;j<f;j++){
                    int k;
                    for(k=i+1; k<n; k++)
                        if(pg[k]==frame[j]) break;
                    // k = next use index (n if never used again)
                    if(k > far){far=k; idx=j;}
                }
                frame[idx] = pg[i];  // replace farthest
            }
            faults++;
        }

        printf("%2d\\t", pg[i]);
        for(int j=0;j<f;j++)
            printf(frame[j]==-1?"[_] ":"[%d] ",frame[j]);
        printf("\\t%s\\n", hit?"HIT":"PAGE FAULT");
    }
    printf("\\n==> Total Page Faults: %d\\n", faults);
    return 0;
}`}
}}};

const nav=document.getElementById('nav');
const main=document.getElementById('main');

function copy(id){
  const el=document.getElementById('code-'+id);
  if(!el) return;
  navigator.clipboard.writeText(el.innerText).then(()=>{
    const btn=document.getElementById('cbtn-'+id);
    if(btn){btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500);}
  });
}

function render(expKey,subKey){
  const exp=data[expKey]; const sub=exp.subs[subKey];
  document.querySelectorAll('.exp-header').forEach(e=>e.classList.toggle('active',e.dataset.exp===expKey));
  document.querySelectorAll('.sub-item').forEach(e=>e.classList.toggle('active',e.dataset.sub===subKey&&e.dataset.exp===expKey));

  const algoHTML=sub.algo.map((s,i)=>`<div class="algo-step">
    <div class="step-num">${i+1}</div>
    <div class="step-content">
      <div class="step-title">${s.t}</div>
      <div class="step-detail">${s.d}</div>
    </div>
  </div>`).join('');

  const uid=expKey+subKey;
  main.innerHTML=`
  <div class="page-title">${sub.title}</div>
  <div class="page-sub">${exp.title}</div>
  <div class="tabs">
    <div class="tab active" onclick="showTab(this,'algo-sec')">Algorithm</div>
    <div class="tab" onclick="showTab(this,'code-sec')">C Code</div>
  </div>
  <div id="algo-sec" class="section-card">
    <div class="section-header"><span class="badge b-algo">ALGORITHM</span><span style="font-size:11px;color:var(--color-text-secondary)">Detailed exam notes</span></div>
    <div class="section-body">${algoHTML}</div>
  </div>
  <div id="code-sec" class="section-card hidden">
    <div class="section-header">
      <span class="badge b-code">C CODE</span>
      <span style="font-size:11px;color:var(--color-text-secondary)">gcc file.c -lpthread -o out</span>
      <button class="copy-btn" id="cbtn-${uid}" onclick="copy('${uid}')">Copy</button>
    </div>
    <div class="section-body">
      <div class="code-wrap"><pre id="code-${uid}">${hl(sub.code)}</pre></div>
    </div>
  </div>`;
}

function showTab(el,sec){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['algo-sec','code-sec'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle('hidden',id!==sec);
  });
}
